name: Release

on:
    pull_request:
        types: [closed]
        branches: [main]

jobs:
    release:
        if: >-
            github.event.pull_request.merged == true && (
              contains(github.event.pull_request.labels.*.name, 'bump:patch') ||
              contains(github.event.pull_request.labels.*.name, 'bump:minor') ||
              contains(github.event.pull_request.labels.*.name, 'bump:major')
            )
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - uses: astral-sh/setup-uv@v8.1.0
              with:
                  python-version: "3.14"
                  enable-cache: true

            - name: Determine bump type
              id: bump
              run: |
                  if ${{ contains(github.event.pull_request.labels.*.name, 'bump:major') }}; then
                    echo "type=major" >> $GITHUB_OUTPUT
                  elif ${{ contains(github.event.pull_request.labels.*.name, 'bump:minor') }}; then
                    echo "type=minor" >> $GITHUB_OUTPUT
                  else
                    echo "type=patch" >> $GITHUB_OUTPUT
                  fi

            - name: Bump version
              id: version
              run: |
                  uv version --bump ${{ steps.bump.outputs.type }}
                  uv lock
                  NEW=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
                  echo "new=$NEW" >> $GITHUB_OUTPUT

            - name: Commit and push tag
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add pyproject.toml uv.lock
                  git commit -m "chore(release): bump version to v${{ steps.version.outputs.new }}"
                  git tag "v${{ steps.version.outputs.new }}"
                  git push origin HEAD:main
                  git push origin "v${{ steps.version.outputs.new }}"
